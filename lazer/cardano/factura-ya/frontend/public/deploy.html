<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Factura Ya — Deploy to PreProd</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: monospace; background: #0a0a0f; color: #e0e0e0; padding: 2rem; max-width: 700px; margin: 0 auto; }
    h1 { color: #4fc3f7; margin-bottom: 1rem; font-size: 1.3rem; }
    #log { background: #111; border: 1px solid #222; border-radius: 8px; padding: 1rem; white-space: pre-wrap; word-break: break-all; font-size: 0.82rem; line-height: 1.6; min-height: 200px; }
    .ok { color: #4caf50; }
    .err { color: #ef5350; }
    .info { color: #4fc3f7; }
    button { margin: 1rem 0; padding: 0.6rem 1.5rem; background: #1a237e; color: #4fc3f7; border: 1px solid #4fc3f7; border-radius: 6px; cursor: pointer; font-size: 1rem; font-family: monospace; }
    button:disabled { opacity: 0.4; cursor: wait; }
    select { padding: 0.4rem; background: #111; color: #e0e0e0; border: 1px solid #333; border-radius: 4px; font-family: monospace; }
  </style>
</head>
<body>
  <h1>Factura Ya — Deploy Validators</h1>
  <p>Select wallet and deploy 3 reference scripts to PreProd.</p>
  <p style="margin-top:0.5rem; color:#666;">Cost: ~40 tADA (locked in UTxOs, recoverable)</p>
  <br>
  <label>Wallet: <select id="walletSelect"><option value="">Detecting...</option></select></label>
  <br>
  <button id="deployBtn" disabled>Deploy to PreProd</button>
  <div id="log"></div>

  <script type="module">
    import { Lucid, Koios, applyParamsToScript, validatorToScriptHash } from "https://unpkg.com/@lucid-evolution/lucid@0.4.29/dist/esm/index.js";

    const log = document.getElementById("log");
    const btn = document.getElementById("deployBtn");
    const sel = document.getElementById("walletSelect");

    function print(msg, cls = "") {
      const span = document.createElement("span");
      span.className = cls;
      span.textContent = msg + "\n";
      log.appendChild(span);
      log.scrollTop = log.scrollHeight;
    }

    // Detect wallets
    setTimeout(() => {
      sel.innerHTML = "";
      const known = ["nami", "eternl", "flint", "lace", "yoroi"];
      let found = 0;
      for (const id of known) {
        if (window.cardano && window.cardano[id]) {
          const opt = document.createElement("option");
          opt.value = id;
          opt.textContent = window.cardano[id].name || id;
          sel.appendChild(opt);
          found++;
        }
      }
      if (found === 0) {
        sel.innerHTML = "<option>No wallet found</option>";
      } else {
        btn.disabled = false;
      }
    }, 1000);

    btn.addEventListener("click", async () => {
      btn.disabled = true;
      try {
        const walletId = sel.value;
        print(`Connecting to ${walletId}...`, "info");
        const walletApi = await window.cardano[walletId].enable();

        print("Initializing Lucid with Koios PreProd...", "info");
        const lucid = await Lucid(
          new Koios("https://preprod.koios.rest/api/v1"),
          "Preprod",
        );
        lucid.selectWallet.fromAPI(walletApi);

        const addr = await lucid.wallet().address();
        print(`Wallet: ${addr}`, "ok");

        const utxos = await lucid.wallet().getUtxos();
        const balance = utxos.reduce((acc, u) => acc + u.assets.lovelace, 0n);
        print(`Balance: ${Number(balance) / 1e6} ADA`, "ok");

        if (balance < 45_000_000n) {
          print("Need at least 45 ADA!", "err");
          btn.disabled = false;
          return;
        }

        print("\nFetching blueprint...", "info");
        const resp = await fetch("/plutus.json");
        const blueprint = await resp.json();

        const escrowV = blueprint.validators.find(v => v.title === "escrow.escrow.spend");
        const invoiceMintV = blueprint.validators.find(v => v.title === "invoice_mint.invoice_mint.mint");
        const marketplaceV = blueprint.validators.find(v => v.title === "marketplace.marketplace.spend");

        print("Applying parameters...", "info");
        const escrowHash = validatorToScriptHash({ type: "PlutusV3", script: escrowV.compiledCode });
        const invoiceMintScript = applyParamsToScript(invoiceMintV.compiledCode, [escrowHash]);
        const invoiceMintPolicyId = validatorToScriptHash({ type: "PlutusV3", script: invoiceMintScript });
        const marketplaceScript = applyParamsToScript(marketplaceV.compiledCode, [invoiceMintPolicyId, escrowHash]);
        const marketplaceHash = validatorToScriptHash({ type: "PlutusV3", script: marketplaceScript });

        print(`Escrow hash:     ${escrowHash}`, "ok");
        print(`Invoice policy:  ${invoiceMintPolicyId}`, "ok");
        print(`Marketplace hash:${marketplaceHash}`, "ok");

        print("\nBuilding transaction (3 reference script outputs)...", "info");
        const tx = await lucid
          .newTx()
          .pay.ToAddressWithData(
            addr,
            { kind: "inline", value: "d87980" },
            { lovelace: 10_000_000n },
            { type: "PlutusV3", script: escrowV.compiledCode },
          )
          .pay.ToAddressWithData(
            addr,
            { kind: "inline", value: "d87980" },
            { lovelace: 15_000_000n },
            { type: "PlutusV3", script: invoiceMintScript },
          )
          .pay.ToAddressWithData(
            addr,
            { kind: "inline", value: "d87980" },
            { lovelace: 15_000_000n },
            { type: "PlutusV3", script: marketplaceScript },
          )
          .complete();

        print("Sign the transaction in your wallet...", "info");
        const signed = await tx.sign.withWallet().complete();

        print("Submitting to PreProd...", "info");
        const txHash = await signed.submit();
        print(`\nTx submitted: ${txHash}`, "ok");

        print("Waiting for confirmation...", "info");
        await lucid.awaitTx(txHash);
        print("CONFIRMED ON-CHAIN!", "ok");
        print(`\nDone! Validators deployed.`, "ok");

      } catch (err) {
        print(`\nError: ${err.message}`, "err");
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
