services:
  # Two distinct Hydra parties are required for offline head so the
  # initial UTxO snapshot is agreed before L2 txs validate.
  hydra-node:
    user: "1000:1000"
    image: ghcr.io/cardano-scaling/hydra-node:1.3.0
    restart: always
    volumes:
      - .:/devnet
    ports:
      - "4011:4011"
      - "5011:5011"
      - "6011:6011"
    command:
      [
        "--node-id", "1",
        "--api-host", "0.0.0.0",
        "--listen", "172.29.88.11:5011",
        "--monitoring-port", "6011",
        "--api-port", "4011",
        "--peer", "172.29.88.12:5012",
        "--hydra-signing-key", "/devnet/credentials/hydra.sk",
        "--hydra-verification-key", "/devnet/credentials/hydra-peer.vk",
        "--persistence-dir", "/devnet/persistence/hydra-node",
        "--offline-head-seed", "fafafafafafafafafafafafafafafafafafafafafafafafafafafafafafafafa",
        "--ledger-protocol-parameters", "/devnet/protocol-parameters.json",
        "--initial-utxo", "/devnet/initial-utxo-set.json"
      ]
    networks:
      pythathon_hydra:
        ipv4_address: 172.29.88.11

  hydra-node-peer:
    user: "1000:1000"
    image: ghcr.io/cardano-scaling/hydra-node:1.3.0
    restart: always
    volumes:
      - .:/devnet
    ports:
      - "4012:4012"
      - "5012:5012"
      - "6012:6012"
    command:
      [
        "--node-id", "2",
        "--api-host", "0.0.0.0",
        "--listen", "172.29.88.12:5012",
        "--monitoring-port", "6012",
        "--api-port", "4012",
        "--peer", "172.29.88.11:5011",
        "--hydra-signing-key", "/devnet/credentials/hydra-peer.sk",
        "--hydra-verification-key", "/devnet/credentials/hydra.vk",
        "--persistence-dir", "/devnet/persistence/hydra-node-peer",
        "--offline-head-seed", "fafafafafafafafafafafafafafafafafafafafafafafafafafafafafafafafa",
        "--ledger-protocol-parameters", "/devnet/protocol-parameters.json",
        "--initial-utxo", "/devnet/initial-utxo-set.json"
      ]
    networks:
      pythathon_hydra:
        ipv4_address: 172.29.88.12

  # Writes /devnet/persistence/.hydra-seed-tx.done on success (wiped with persistence/).
  hydra-seed-tx:
    image: alpine:3.20
    restart: "no"
    depends_on:
      hydra-node:
        condition: service_started
      hydra-node-peer:
        condition: service_started
    volumes:
      - .:/devnet
    environment:
      HYDRA_HTTP_HOST: hydra-node
      HYDRA_HTTP_PORT: "4011"
      HYDRA_WS_URL: ws://hydra-node:4011
    command: ["/bin/sh", "/devnet/submit-seed-tx.sh"]
    networks:
      - pythathon_hydra

networks:
  pythathon_hydra:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.88.0/24
          gateway: 172.29.88.1
