name: "Lazer Stellar Test"
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lazer-stellar-test:
    name: Lazer Stellar Test
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: lazer/stellar
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.91.1
          components: clippy, rustfmt
          target: wasm32-unknown-unknown
          cache-workspaces: "lazer/stellar -> target"
          rustflags: ""
      - name: install extra tools
        run: cargo install --locked taplo-cli@0.9.3
      - name: check Cargo.toml formatting
        run: find . -name Cargo.toml -exec taplo fmt --check --diff {} \;
      - name: check Rust formatting
        run: cargo fmt --all -- --check
      - name: check Rust clippy
        run: cargo clippy --release --target wasm32-unknown-unknown --locked -- --deny warnings
      - name: Build wasm
        run: cargo build --release --target wasm32-unknown-unknown --locked
